<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Pokémon Manager" />
  <title>Pokemon Collection V2</title>
  <link rel="preconnect" href="https://raw.githubusercontent.com" />
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="./mobile.css" />
  <link rel="stylesheet" href="./ui-refinements.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Hoofdnavigatie">
      <div class="brand"><div class="brand-mark"></div><div><strong>Pokemon Collection</strong><span>V2</span></div></div>
      <nav class="nav-tabs" aria-label="Secties">
        <button class="nav-tab active" data-view="dashboard" type="button"><span class="nav-icon">📊</span><span class="nav-label">Dashboard</span></button>
        <button class="nav-tab" data-view="collection" type="button"><span class="nav-icon">📁</span><span class="nav-label">Collectie</span></button>
        <button class="nav-tab" data-view="search" type="button"><span class="nav-icon">🔎</span><span class="nav-label">Zoeken</span></button>
        <button class="nav-tab" data-view="sets" type="button"><span class="nav-icon">🗂️</span><span class="nav-label">Sets</span></button>
        <button class="nav-tab" data-view="wishlist" type="button"><span class="nav-icon">⭐</span><span class="nav-label">Wishlist</span></button>
        <button class="nav-tab" data-view="pokedex" type="button"><span class="nav-icon">📖</span><span class="nav-label">Pokédex</span></button>
      </nav>
      <div class="storage-box"><span>Lokale opslag</span><strong>Actief</strong></div>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div><p class="eyebrow" id="viewKicker">Overzicht</p><h1 id="viewTitle">Dashboard</h1></div>
        <div class="owner-card" aria-label="Collectie kiezen">
          <span class="owner-label">Actieve collectie</span>
          <div class="collection-switch">
            <button class="owner-toggle active" data-owner="Lars" type="button"><strong>Lars</strong><span>Binder</span></button>
            <button class="owner-toggle" data-owner="Lore" type="button"><strong>Lore</strong><span>Binder</span></button>
          </div>
        </div>
        <div class="top-actions">
          <button id="exportBtn" class="icon-button" type="button" title="Collectie exporteren" aria-label="Collectie exporteren">↓</button>
          <label class="import-label" title="Collectie importeren">↑<input id="importFile" type="file" accept="application/json" /></label>
        </div>
      </header>

      <section id="dashboard" class="view active-view">
        <div class="metrics-grid">
          <div class="metric"><span>Kaarten</span><strong id="metricCards">0</strong></div>
          <div class="metric"><span>Unieke Pokémon</span><strong id="metricPokemon">0</strong></div>
          <div class="metric"><span>Sets</span><strong id="metricSets">0</strong></div>
          <div class="metric"><span>Wishlist</span><strong id="metricWishlist">0</strong></div>
        </div>
        <div class="dashboard-grid">
          <section class="panel"><div class="panel-heading"><h2>Collectiestatus</h2><span id="completionLabel">0%</span></div><div class="progress-track"><div id="completionBar" class="progress-bar"></div></div><div id="typeBreakdown" class="type-breakdown"></div></section>
          <section class="panel"><div class="panel-heading"><h2>Nieuwste aanwinsten</h2><button class="text-action" data-view-link="collection" type="button">Bekijk</button></div><div id="recentList" class="compact-list"></div></section>
        </div>
      </section>

      <section id="collection" class="view">
        <div class="tool-strip">
          <div class="search-box"><span>Zoek</span><input id="collectionSearch" type="search" placeholder="Zoek in je collectie" /></div>
          <select id="typeFilter" aria-label="Filter op type"><option value="all">Alle types</option></select>
          <select id="rarityFilter" aria-label="Filter op zeldzaamheid"><option value="all">Alle zeldzaamheden</option></select>
          <button id="sortToggle" class="chip-button" type="button">Naam A-Z</button>
        </div>
        <div id="collectionGrid" class="card-grid"></div>
      </section>

      <section id="search" class="view">
        <div class="editor-panel search-panel">
          <h2>Kaart zoeken</h2>
          <div class="form-grid">
            <label>Naam kaart / Pokémon<input id="globalCardSearch" type="search" placeholder="Pikachu, Charizard, Mew..." /></label>
            <label>Set bevat<input id="globalSetFilter" type="search" placeholder="151, Obsidian, Evolving..." /></label>
            <label>Type<select id="globalTypeFilter"><option value="all">Alle types</option></select></label>
            <label>Zeldzaamheid<select id="globalRarityFilter"><option value="all">Alle zeldzaamheden</option></select></label>
          </div>
          <button id="globalSearchBtn" class="primary-action" type="button">Zoek kaarten</button>
        </div>
        <div id="globalSearchStatus" class="set-status">Zoek via de Pokémon TCG API en voeg kaarten toe aan collectie of wishlist.</div>
        <div id="globalSearchGrid" class="set-cards-grid"></div>
      </section>

      <section id="sets" class="view">
        <div class="tool-strip">
          <div class="search-box"><span>Zoek</span><input id="setSearch" type="search" placeholder="Zoek set, serie of jaar" /></div>
          <select id="setSelect" aria-label="Kies set"><option value="">Set kiezen</option></select>
          <button id="refreshSetsBtn" class="chip-button" type="button">Ververs sets</button>
        </div>
        <div id="setsStatus" class="set-status">Sets worden geladen...</div>
        <div id="setsGrid" class="sets-grid"></div>
      </section>

      <section id="wishlist" class="view">
        <div class="tool-strip"><div class="search-box"><span>Zoek</span><input id="wishlistSearch" type="search" placeholder="Zoek in je wishlist" /></div></div>
        <div id="wishlistGrid" class="card-grid"></div>
      </section>

      <section id="pokedex" class="view">
        <div class="tool-strip pokedex-tools">
          <div class="search-box"><span>Zoek</span><input id="pokedexSearch" type="search" placeholder="Zoek Pokémon" /></div>
          <select id="pokedexType" aria-label="Pokedex type"><option value="all">Alle types</option></select>
          <button id="pokedexGridMode" class="chip-button active" type="button">Kaarten</button>
          <button id="pokedexBinderMode" class="chip-button" type="button">Binder view</button>
        </div>
        <div id="pokedexGrid" class="pokedex-grid"></div>
      </section>
    </main>
  </div>

  <dialog id="detailDialog"><button id="closeDialog" class="close-button" type="button" aria-label="Sluiten">✕</button><div id="detailContent"></div></dialog>
  <dialog id="setDialog"><button id="closeSetDialog" class="close-button" type="button" aria-label="Sluiten">✕</button><div id="setDialogContent"></div></dialog>

  <script src="./app.js"></script>
  <script src="./cloud-sync.js"></script>
</body>
</html>
